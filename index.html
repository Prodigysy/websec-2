<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEATHER//TERMINAL_v2.0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="search-container">
        <span class="scan-line"></span>
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" id="city-search" placeholder="SYSTEM//SEARCH_CITY..." autocomplete="off">
        
        <button id="geo-btn" aria-label="MY LOCATION">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        </button>

        <button id="theme-toggle" aria-label="TOGGLE THEME">
            <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            <svg class="sun-icon hidden" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        </button>
    </div>

    <div id="layer-controls">
        <button data-layer="default" class="active">DEFAULT</button>
        <button data-layer="satellite">SATELLITE</button>
        <button data-layer="topo">TOPO</button>
    </div>

    <div id="map"></div>
    <div id="weather-sidebar" class="hidden">
        <div class="sidebar-content">
            <div class="sidebar-header">
                <h2 id="sidebar-city-name">STATUS//NONE</h2>
                <button id="close-sidebar" aria-label="CLOSE">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div id="live-weather-card">
                <div class="main-info">
                    <div id="current-icon">--</div>
                    <div id="current-temp">--°</div>
                </div>
                <div class="weather-details">
                    <div class="detail-item humidity">
                        <span class="label">ВЛАЖНОСТЬ</span>
                        <span class="value" id="current-humidity">--%</span>
                    </div>
                    <div class="detail-item wind">
                        <span class="label">ВЕТЕР</span>
                        <span class="value" id="current-wind">-- КМ/Ч</span>
                    </div>
                    <div class="detail-item pressure">
                        <span class="label">ДАВЛЕНИЕ</span>
                        <span class="value" id="current-pressure">-- ММ</span>
                    </div>
                </div>
                <div class="system-status">REALTIME_DATA//OK</div>
            </div>
            <div class="chart-section">
                <h3>24H//FORECAST</h3>
                <div class="chart-container">
                    <canvas id="weatherChart"></canvas>
                </div>
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
</body>
</html>
